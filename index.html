<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Digital Detox Planner</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>AI Digital Detox Planner</h1>

        <label>Enter Your Name</label>
        <input type="text" id="name">

        <label>Daily Screen Time (hours)</label>
        <input type="number" id="screenTime">

        <label>Daily Sleep Hours</label>
        <input type="number" id="sleepHours">

        <label>Most Used Applications</label>
        <textarea id="apps"></textarea>

        <button onclick="generatePlan()">
            Generate Detox Plan
        </button>

        <div class="result" id="result"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
